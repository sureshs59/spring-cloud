# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── GraphQL ───────────────────────────────────────────────────────────────────
# Enable the in-browser GraphiQL IDE at http://localhost:8080/graphiql
#spring.graphql.graphiql.enabled=true

# Schema files location (all *.graphqls files in this folder are loaded)
spring.graphql.schema.locations=classpath:graphql/

# WebSocket path for GraphQL Subscriptions
spring.graphql.websocket.path=/graphql-ws

# ── H2 Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:expensedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.graphql=DEBUG
logging.level.com.expensetracker=DEBUG



# GraphiQL \u2014 use local bundled assets, NOT unpkg CDN
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# Tell Spring NOT to redirect /graphiql to /graphiql/ (trailing slash bug)
spring.mvc.pathmatch.use-suffix-pattern=false
spring.web.resources.add-mappings=true

# Disable CSRF \u2014 GraphiQL POSTs to /graphql without a CSRF token
spring.security.enabled=false
# (if you have Spring Security on the classpath, see Fix 3 below)
